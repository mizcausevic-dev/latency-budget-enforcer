name: CI

on:
  push:
    branches: ["main", "project/**"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./...
